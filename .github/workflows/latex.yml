name: Build LaTeX and Deploy PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX - tanulmany
        uses: xu-cheng/latex-action@v2
        with:
          root_file: tanulmany.tex
          working_directory: tanulmany

      - name: Compile LaTeX - eu palyazat
        uses: xu-cheng/latex-action@v2
        with:
          root_file: eu.tex
          working_directory: palyazat

      - name: Prepare site
        run: |
          mkdir public
          cp tanulmany/tanulmany.pdf public/tanulmany.pdf
          cp palyazat/eu.pdf public/eu.pdf
          cp index.html public/index.html 
          cp style.css public/style.css

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
