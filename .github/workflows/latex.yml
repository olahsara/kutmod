name: Build LaTeX and Deploy PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: tanulmany/main.tex

      - name: Prepare site
        run: |
          mkdir public
          cp tanulmany/main.pdf public/main.pdf
          cp tanulmany/index.html public/index.html 
          cp tanulmany/style.css public/style.css

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
