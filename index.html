<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kutatásmódszertan - Dokumentumok</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="home" class="home">
      <div class="hero">
        <h1>Dokumentumok</h1>
        <p>Válaszd ki, melyik anyagot szeretnéd megtekinteni</p>
      </div>

      <div class="card-container">
        <button class="card" onclick="navigate('tanulmany')">
          <h2>Tanulmány</h2>
          <p>
            A "vibe coding" és az AI-ra való túlzott támaszkodás hatásainak
            elemzése.
          </p>
        </button>

        <button class="card" onclick="navigate('eu')">
          <h2>EU pályázat</h2>
          <p>Digitális örökségvédelem XR technológiákkal</p>
        </button>
      </div>
    </div>

    <!-- PDF VIEW -->
    <div id="viewer" class="viewer hidden">
      <div class="topbar">
        <button onclick="goHome()">Vissza</button>
        <span id="docTitle"></span>
        <div></div>
      </div>

      <embed id="pdfViewer" class="pdf-embed" src="" type="application/pdf" />

      <a class="mobile-fallback" id="fallbackLink" href="#" target="_blank">
        Megnyitás / letöltés
      </a>
    </div>

    <script>
      const routes = {
        tanulmany: {
          file: "main.pdf",
          title: "Tanulmány",
        },
        eu: {
          file: "eu.pdf",
          title: "EU pályázat",
        },
      };

      function navigate(route) {
        window.location.hash = route;
      }

      function goHome() {
        window.location.hash = "";
      }

      function render() {
        const hash = window.location.hash.replace("#", "");

        const home = document.getElementById("home");
        const viewer = document.getElementById("viewer");

        home.classList.remove("show");
        viewer.classList.remove("show");

        setTimeout(() => {
          if (routes[hash]) {
            const data = routes[hash];

            home.style.display = "none";
            viewer.style.display = "block";

            document.getElementById("pdfViewer").src = data.file;
            document.getElementById("fallbackLink").href = data.file;
            document.getElementById("docTitle").textContent = data.title;

            // FADE IN viewer
            setTimeout(() => viewer.classList.add("show"), 10);
          } else {
            viewer.style.display = "none";
            home.style.display = "block";

            // FADE IN home
            setTimeout(() => home.classList.add("show"), 10);
          }
        }, 200);
      }

      window.addEventListener("load", () => {
        document.getElementById("home").classList.add("show");
        render();
      });

      window.addEventListener("hashchange", render);
    </script>
  </body>
</html>
