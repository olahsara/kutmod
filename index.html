<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kutatásmódszertan: Tanulmány és Pályázat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="menu">
      <button onclick="loadPDF('main.pdf')">Tanulmány</button>
      <button onclick="loadPDF('eu.pdf')">EU pályázat</button>
    </div>

    <embed
      id="pdfViewer"
      class="pdf-embed"
      src="main.pdf"
      type="application/pdf"
    />

    <div class="mobile-fallback">
      <h2>Úgy tűnik, mobilon vagy!</h2>
      <p>
        A mobilböngészők néha nem tudják közvetlenül az oldalon megjeleníteni a
        PDF-et.
      </p>
      <a id="fallbackLink" href="main.pdf" target="_blank">
        Kattints ide a cikk megnyitásához / letöltéséhez
      </a>
    </div>

    <script>
      function loadPDF(file) {
        document.getElementById("pdfViewer").src = file;
        document.getElementById("fallbackLink").href = file;
      }
    </script>
  </body>
</html>
